<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dead City SF &mdash; Terminal</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <style>
    /* Terminal layout. Shared colours/font/height come from style.css;
       only this page's flex column and input row live here. */
    body.terminal {
      display: flex;
      flex-direction: column;
    }
    #output {
      flex: 1 1 auto;
      min-height: 0;            /* let the flex item shrink so it scrolls */
      overflow-y: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      padding: 14px 14px 0;
      font-size: 15px;
      line-height: 1.35;
    }
    #input-line {
      flex: 0 0 auto;
      display: flex;
      align-items: baseline;
      padding: 8px 14px 14px;
      font-size: 15px;
      line-height: 1.35;
    }
    #prompt {
      margin-right: 0.5ch;
      white-space: pre;
    }
    #input {
      flex: 1 1 auto;
      min-width: 0;
      background: transparent;
      border: none;
      outline: none;
      color: #d4890a;
      caret-color: #d4890a;
      font-family: inherit;
      font-size: inherit;
      line-height: inherit;
      padding: 0;
    }
  </style>
</head>
<body class="terminal">
  <div id="output"></div>
  <div id="input-line">
    <span id="prompt">&gt;</span>
    <input id="input" type="text" autocomplete="off" autocapitalize="off"
           autocorrect="off" spellcheck="false" aria-label="Command input">
  </div>

  <script>
  (async () => {
    "use strict";

    const RAW_BASE =
      "https://raw.githubusercontent.com/sevmorris/dead-city-sf/main/deadcitysf/";
    const PYODIDE_INDEX = "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/";
    const MODULES = ["__init__.py", "utils.py", "world.py", "items.py",
                     "save.py", "commands.py", "engine.py", "web.py"];

    const output = document.getElementById("output");
    const input = document.getElementById("input");

    // Every write appends a text node and pins the scroll to the bottom —
    // synchronous and reliable; the browser computes scrollHeight on read.
    function out(text) {
      output.appendChild(document.createTextNode(text));
      output.scrollTop = output.scrollHeight;
    }
    function outln(text) { out((text || "") + "\n"); }

    function fail(message, detail) {
      outln("");
      outln(message);
      if (detail) outln("  " + detail);
      outln("Check your connection and refresh.");
    }

    // Keep the input focused; a click anywhere refocuses it (but not while
    // the player is selecting text to copy).
    input.focus();
    document.addEventListener("click", () => {
      if (window.getSelection().toString() === "") input.focus();
    });

    let processCommand = null;
    let state = null;
    let acceptingInput = false;

    // --- boot -------------------------------------------------------------
    try {
      outln("Tuning the shortwave through sixty-three days of static...");
      const pyodide = await loadPyodide({ indexURL: PYODIDE_INDEX });

      outln("Dragging the grid back online, one dead block at a time...");
      try {
        pyodide.FS.mkdir("/deadcitysf");
        for (const mod of MODULES) {
          const resp = await fetch(RAW_BASE + mod);
          if (!resp.ok) throw new Error(`${mod} (HTTP ${resp.status})`);
          pyodide.FS.writeFile("/deadcitysf/" + mod, await resp.text());
        }
      } catch (err) {
        fail("The signal drops. Could not pull the city down:", err.message);
        return;
      }

      await pyodide.runPythonAsync(`
import sys
sys.path.insert(0, '/')
from deadcitysf.web import init_game, process_command
`);

      const initGame = pyodide.globals.get("init_game");
      processCommand = pyodide.globals.get("process_command");

      outln("The ash settles. The city is waiting.");
      outln("");

      const initResult = initGame();
      state = initResult.get(0);                 // PyProxy GameState (kept)
      out(initResult.get(1));                     // intro + first look
      initResult.destroy();
      initGame.destroy();

      acceptingInput = true;
      input.focus();
    } catch (err) {
      fail("The city won't wake. Something failed to load:", err.message);
      return;
    }

    // --- input loop -------------------------------------------------------
    function runCommand(cmd) {
      let result = "", gameOver = false;
      try {
        const res = processCommand(state, cmd);
        const arr = res.toJs();                  // [output_string, game_over_bool]
        result = arr[0];
        gameOver = arr[1];
        res.destroy();
      } catch (err) {
        result = "\nSomething broke in the dead city:\n  " + err.message + "\n";
      }
      out(result);
      if (gameOver) {
        acceptingInput = false;
        input.disabled = true;
        outln("");
        outln("[ refresh the page to begin again ]");
      }
    }

    input.addEventListener("keydown", (e) => {
      if (e.key !== "Enter" || !acceptingInput) return;
      e.preventDefault();
      const cmd = input.value;
      input.value = "";
      outln("> " + cmd);
      runCommand(cmd);
      input.focus();
    });
  })();
  </script>
</body>
</html>
